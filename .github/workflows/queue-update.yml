name: Queue status update

on:
  schedule:
    # 15分ごと（JST 10:00–24:00 ≒ UTC 01:00–15:00）
    - cron: "*/15 1-15 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: queue-status-update
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch queue status
        run: python fetch_queue.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add queue.json stores.json
          if git diff --staged --quiet; then
            echo "No changes in queue data"
            exit 0
          fi
          git commit -m "Update queue.json ($(date -u +%Y-%m-%dT%H:%MZ))"
          git push
